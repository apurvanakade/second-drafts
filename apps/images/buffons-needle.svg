<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGrad1)"/>
  
  <!-- Parallel lines -->
  <line x1="0" y1="50" x2="400" y2="50" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Needles -->
  <line x1="100" y1="75" x2="140" y2="85" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="120" x2="230" y2="140" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="180" x2="175" y2="165" stroke="#FF6B6B" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="210" x2="310" y2="225" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="320" y1="160" x2="345" y2="145" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">Buffon's Needle</text>
</svg>
