  <circle cx="170" cy="160" r="3" fill="#FFD700"/>
  <circle cx="230" cy="120" r="3" fill="#4ECDC4"/>
  
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="bold">Estimating π</text>
